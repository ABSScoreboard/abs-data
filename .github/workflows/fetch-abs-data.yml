name: Fetch ABS Challenge Data

on:
  schedule:
    - cron: "0 12 * * *"   # 8am ET daily
    - cron: "0 15 * * *"   # 11am ET daily
    - cron: "0 2 * * *"    # 10pm ET daily
  workflow_dispatch:        # Manual trigger from Actions tab

# Prevent concurrent runs conflicting on git push
concurrency:
  group: abs-data-fetch
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch ABS data from Baseball Savant
        run: python scripts/fetch_abs.py

      - name: Commit updated data
        run: |
          git config user.name  "ABS Data Bot"
          git config user.email "bot@absscoreboard.github.io"
          git add data/abs-challenges.json
          # Only commit if there are actual changes to the data file
          if git diff --staged --quiet; then
            echo "No data changes — skipping commit"
          else
            git commit -m "Auto-update ABS data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
            git push
          fi
