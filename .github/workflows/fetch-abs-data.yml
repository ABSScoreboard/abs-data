name: Fetch ABS Challenge Data

on:
  schedule:
    - cron: "0 12 * * *"   # 8am ET daily
    - cron: "0 15 * * *"   # 11am ET daily
    - cron: "0 2 * * *"    # 10pm ET daily
  push:
    branches: [main]
  workflow_dispatch:

# Prevent concurrent runs from conflicting on git push
concurrency:
  group: abs-data-fetch
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Pull latest before we push to avoid conflicts
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Fetch ABS data from Baseball Savant
        run: python scripts/fetch_abs.py

      - name: Commit updated data
        run: |
          git config user.name  "ABS Data Bot"
          git config user.email "bot@absscoreboard.github.io"
          git pull --rebase origin main
          git add data/abs-challenges.json
          git diff --staged --quiet || git commit -m "Auto-update ABS data [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
